,<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Donations - Guthli Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table thead {
            background-color: #667eea;
            color: white;
        }
        
        table th, table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        table tr:hover {
            background-color: #f5f5f5;
        }
        
        table tr:last-child td {
            border-bottom: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background-color: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .nav-buttons {
            text-align: center;
            margin-top: 30px;
        }
        
        .nav-buttons button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            margin: 0 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        
        .nav-buttons button:hover {
            background-color: #764ba2;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 All Donations</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Total seeds donated by our community</p>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Donations</h3>
                <div class="value" id="totalDonations">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Seeds</h3>
                <div class="value" id="totalSeeds">0</div>
            </div>
            <div class="stat-card">
                <h3>Unique Donors</h3>
                <div class="value" id="uniqueDonors">0</div>
            </div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="loading" class="loading">⏳ Loading donations...</div>
        
        <table id="donationsTable" style="display: none;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Donor Name</th>
                    <th>Number of Seeds</th>
                    <th>Location</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
        
        <div id="emptyState" class="empty-state" style="display: none;">
            📭 No donations yet. Be the first to donate!
        </div>
        
        <div class="nav-buttons">
            <button onclick="location.href='index.html'">← Back to Home</button>
            <button onclick="location.href='guthli_donation.html'">💚 Make a Donation</button>
            <button onclick="location.reload()">🔄 Refresh</button>
        </div>
    </div>
    
    <script>
        // Load all donations
        async function loadDonations() {
            try {
                const response = await fetch('https://final-project-full-stack-production.up.railway.app/api/seeds/all');
                const donations = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (donations.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }
                
                // Calculate stats
                document.getElementById('totalDonations').textContent = donations.length;
                const totalSeeds = donations.reduce((sum, d) => sum + d.quantity, 0);
                document.getElementById('totalSeeds').textContent = totalSeeds.toLocaleString();
                
                const uniqueDonors = new Set(donations.map(d => d.donorName)).size;
                document.getElementById('uniqueDonors').textContent = uniqueDonors;
                
                // Populate table
                const tbody = document.getElementById('tableBody');
                donations.forEach((donation, index) => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${donation.donorName}</td>
                        <td>${donation.quantity.toLocaleString()}</td>
                        <td>${donation.location}</td>
                    `;
                });
                
                document.getElementById('donationsTable').style.display = 'table';
                
            } catch (error) {
                console.error('Error loading donations:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '❌ Error loading donations: ' + error.message;
            }
        }
        
        // Load donations when page loads
        window.addEventListener('load', loadDonations);
    </script>
</body>
</html>
