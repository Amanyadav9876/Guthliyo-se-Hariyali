<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guthli Se Hariyali</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            padding: 0;
            overflow: hidden;
        }
        
        .tabs {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }
        
        .tab-button {
            flex: 1;
            padding: 15px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            color: #666;
        }
        
        .tab-button.active {
            background: #2ecc71;
            color: white;
            border-bottom: 3px solid #27ae60;
        }
        
        .tab-content {
            display: none;
            padding: 30px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        h2 {
            color: #2ecc71;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #2ecc71;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #27ae60;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .message {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .links a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: bold;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        
        .back-link a {
            color: #2ecc71;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('donor-login', this)">
                🌱 Donor Login
            </button>
            <button class="tab-button" onclick="switchTab('volunteer-login', this)">
                🤝 Volunteer Login
            </button>
        </div>
        
        <!-- Donor Login Tab -->
        <div id="donor-login" class="tab-content active">
            <h2>🌱 Donor Login</h2>
            <div id="donor-message" class="message" style="display: none;"></div>
            <form id="donorLoginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="donorEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="donorPassword" required>
                </div>
                <button type="submit">Login as Donor</button>
            </form>
            <div class="links">
                Don't have an account? <a href="signup.html?role=donor">Sign up here</a>
            </div>
        </div>
        
        <!-- Volunteer Login Tab -->
        <div id="volunteer-login" class="tab-content">
            <h2>🤝 Volunteer Login</h2>
            <div id="volunteer-message" class="message" style="display: none;"></div>
            <form id="volunteerLoginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="volunteerEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="volunteerPassword" required>
                </div>
                <button type="submit">Login as Volunteer</button>
            </form>
            <div class="links">
                Don't have an account? <a href="signup.html?role=volunteer">Sign up here</a>
            </div>
        </div>
        
        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>
    
    <script>
        // Switch between tabs
        function switchTab(tabName, button) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            button.classList.add('active');
        }
        
        // Donor Login
        document.getElementById('donorLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('donorEmail').value;
            const password = document.getElementById('donorPassword').value;
            const messageDiv = document.getElementById('donor-message');
            
            try {
                const response = await fetch('https://final-project-full-stack-production.up.railway.app/api/users/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                if (response.ok) {
                    const user = await response.json();
                    
                    // Check if user is actually a donor
                    if (user.role !== 'DONOR') {
                        throw new Error('This account is registered as a Volunteer. Please login with Volunteer credentials.');
                    }
                    
                    // Save to localStorage
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Login successful! Redirecting...';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'donor-dashboard.html';
                    }, 1500);
                } else {
                    throw new Error('Invalid email or password');
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ ' + error.message;
                messageDiv.style.display = 'block';
            }
        });
        
        // Volunteer Login
        document.getElementById('volunteerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('volunteerEmail').value;
            const password = document.getElementById('volunteerPassword').value;
            const messageDiv = document.getElementById('volunteer-message');
            
            try {
                const response = await fetch('https://final-project-full-stack-production.up.railway.app/api/users/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                if (response.ok) {
                    const user = await response.json();
                    
                    // Check if user is actually a volunteer
                    if (user.role !== 'VOLUNTEER') {
                        throw new Error('This account is registered as a Donor. Please login with Donor credentials.');
                    }
                    
                    // Save to localStorage
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Login successful! Redirecting...';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'volunteer-dashboard.html';
                    }, 1500);
                } else {
                    throw new Error('Invalid email or password');
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ ' + error.message;
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
